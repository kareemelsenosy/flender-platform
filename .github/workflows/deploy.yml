name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run smoke tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          CLAUDE_API_KEY:      ${{ secrets.CLAUDE_API_KEY }}
          SMT_DB_PASSWORD:     ${{ secrets.SMT_DB_PASSWORD }}
          MINIO_ROOT_USER:     ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: CLAUDE_API_KEY,SMT_DB_PASSWORD,MINIO_ROOT_USER,MINIO_ROOT_PASSWORD
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            python3 - <<'PY'
            import os
            from pathlib import Path

            env_path = Path(".env")
            lines = env_path.read_text().splitlines() if env_path.exists() else []

            # Inject these from GitHub Actions secrets — only those that are set.
            # Existing values are replaced, missing ones are appended.
            INJECT = {
                "CLAUDE_API_KEY":      os.environ.get("CLAUDE_API_KEY", "").strip(),
                "SMT_DB_PASSWORD":     os.environ.get("SMT_DB_PASSWORD", "").strip(),
                "MINIO_ROOT_USER":     os.environ.get("MINIO_ROOT_USER", "").strip(),
                "MINIO_ROOT_PASSWORD": os.environ.get("MINIO_ROOT_PASSWORD", "").strip(),
            }
            to_set = {k: v for k, v in INJECT.items() if v}

            seen = set()
            out = []
            for line in lines:
                matched = False
                for k, v in to_set.items():
                    if line.startswith(f"{k}="):
                        out.append(f"{k}={v}")
                        seen.add(k)
                        matched = True
                        break
                if not matched:
                    out.append(line)

            for k, v in to_set.items():
                if k not in seen:
                    out.append(f"{k}={v}")

            env_path.write_text("\n".join(out).rstrip() + "\n")
            print(f"Updated .env with {len(to_set)} key(s) from secrets")
            PY
            docker compose pull
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f

            # Sync nginx config if it changed and reload (best-effort: won't
            # fail the whole deploy if sudo isn't available, just logs).
            NGINX_DST="/etc/nginx/sites-available/ordersheet.flendergroup.com"
            if [ -f nginx.conf ] && [ -f "$NGINX_DST" ]; then
              if ! sudo -n cmp -s nginx.conf "$NGINX_DST" 2>/dev/null; then
                echo "Updating nginx config..."
                if sudo -n cp nginx.conf "$NGINX_DST" 2>/dev/null && \
                   sudo -n nginx -t 2>/dev/null && \
                   sudo -n systemctl reload nginx 2>/dev/null; then
                  echo "OK nginx reloaded with new config"
                else
                  echo "WARN: Could not reload nginx automatically — needs manual:"
                  echo "    sudo cp nginx.conf $NGINX_DST"
                  echo "    sudo nginx -t && sudo systemctl reload nginx"
                fi
              else
                echo "nginx config unchanged, skipping reload"
              fi
            fi
