name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run smoke tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: CLAUDE_API_KEY
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            python3 - <<'PY'
            import os
            from pathlib import Path

            env_path = Path(".env")
            lines = env_path.read_text().splitlines() if env_path.exists() else []
            claude_key = os.environ.get("CLAUDE_API_KEY", "").strip()

            if claude_key:
                updated = []
                replaced = False
                for line in lines:
                    if line.startswith("CLAUDE_API_KEY="):
                        updated.append(f"CLAUDE_API_KEY={claude_key}")
                        replaced = True
                    else:
                        updated.append(line)
                if not replaced:
                    updated.append(f"CLAUDE_API_KEY={claude_key}")
                env_path.write_text("\n".join(updated).rstrip() + "\n")
            PY
            docker compose pull
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f

            # Sync nginx config if it changed and reload (best-effort: won't
            # fail the whole deploy if sudo isn't available, just logs).
            NGINX_DST="/etc/nginx/sites-available/ordersheet.flendergroup.com"
            if [ -f nginx.conf ] && [ -f "$NGINX_DST" ]; then
              if ! sudo -n cmp -s nginx.conf "$NGINX_DST" 2>/dev/null; then
                echo "Updating nginx config..."
                if sudo -n cp nginx.conf "$NGINX_DST" 2>/dev/null && \
                   sudo -n nginx -t 2>/dev/null && \
                   sudo -n systemctl reload nginx 2>/dev/null; then
                  echo "✅ nginx reloaded with new config"
                else
                  echo "⚠️  Could not reload nginx automatically — needs manual:"
                  echo "    sudo cp nginx.conf $NGINX_DST"
                  echo "    sudo nginx -t && sudo systemctl reload nginx"
                fi
              else
                echo "nginx config unchanged, skipping reload"
              fi
            fi
