name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run smoke tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          CLAUDE_API_KEY:      ${{ secrets.CLAUDE_API_KEY }}
          SMT_DB_PASSWORD:     ${{ secrets.SMT_DB_PASSWORD }}
          MINIO_ROOT_USER:     ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          CARHARTT_B2B_USER:   ${{ secrets.CARHARTT_B2B_USER }}
          CARHARTT_B2B_PASS:   ${{ secrets.CARHARTT_B2B_PASS }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: CLAUDE_API_KEY,SMT_DB_PASSWORD,MINIO_ROOT_USER,MINIO_ROOT_PASSWORD,CARHARTT_B2B_USER,CARHARTT_B2B_PASS
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # docker compose reads ${VAR} from the shell environment (and falls
            # back to .env). Exporting here means we never need to write .env
            # on the server — the existing .env stays untouched and supplies
            # the keys it already has (POSTGRES_PASSWORD, SECRET_KEY, etc.).
            export CLAUDE_API_KEY SMT_DB_PASSWORD MINIO_ROOT_USER MINIO_ROOT_PASSWORD
            export CARHARTT_B2B_USER CARHARTT_B2B_PASS

            docker compose pull
            docker compose build --no-cache
            # Stop & remove the project's containers cleanly, then bring them
            # back up. This avoids two prior failure modes:
            #   1) "container name already in use" when a renamed orphan
            #      from a failed build holds the name a new container needs.
            #   2) "removal of container ... is already in progress" when
            #      `docker container prune` raced with `up --force-recreate`.
            # Brief downtime (a few seconds) for a fully reliable deploy.
            docker compose down --remove-orphans
            docker compose up -d
            docker image prune -f

            # /smt/* is reverse-proxied by FastAPI (see app/routers/smt_proxy.py).
            # The host nginx config doesn't need to know about SMT — it already
            # forwards everything to the app container on :8000.
