services:
  # ── Order Sheet platform — database ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flender
      POSTGRES_USER: flender
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flender"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Order Sheet platform + AI Tools hub (FastAPI) ───────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://flender:${POSTGRES_PASSWORD}@db:5432/flender
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      GOOGLE_SEARCH_KEY: ${GOOGLE_SEARCH_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-https://ordersheet.flendergroup.com}
      SMT_URL: ${SMT_URL:-https://smt.flendergroup.com}
      PORT: "8000"
    volumes:
      - app_uploads:/app/uploads
      - app_output:/app/output
      - app_data:/app/data
      - app_credentials:/app/credentials

  # ── Social Media Tracker — isolated database ────────────────────────────────
  smt-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: smt
      POSTGRES_USER: smt
      POSTGRES_PASSWORD: ${SMT_DB_PASSWORD:?Set SMT_DB_PASSWORD in .env}
    volumes:
      - smt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smt"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Social Media Tracker — object storage (S3-compatible) ───────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - minio_data:/data
    ports:
      # Admin console — bound to localhost only (not public)
      - "127.0.0.1:9001:9001"

  # ── Social Media Tracker (Next.js) ──────────────────────────────────────────
  smt:
    build: ./smt
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      smt-db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://smt:${SMT_DB_PASSWORD}@smt-db:5432/smt
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${SMT_S3_BUCKET:-smt-uploads}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      NODE_ENV: production

volumes:
  postgres_data:
  app_uploads:
  app_output:
  app_data:
  app_credentials:
  smt_postgres_data:
  minio_data:
