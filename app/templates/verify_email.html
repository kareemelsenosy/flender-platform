<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLENDER — Verify Your Email</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Bebas+Neue&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    .code-inputs { display:flex; gap:10px; justify-content:center; margin:24px 0; }
    .code-inputs input {
      width:48px; height:60px; text-align:center; font-size:1.6rem; font-weight:700;
      border:2px solid #D1D5DB; border-radius:10px; outline:none;
      transition:border-color .15s;
    }
    .code-inputs input:focus { border-color:#111827; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 style="font-family:'Bebas Neue','Arial Narrow',sans-serif;font-weight:400;letter-spacing:6px;font-size:2.4rem">FLENDER</h1>
      <p class="subtitle">Order Sheet Organizer</p>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      {% if resent %}
      <div class="alert" style="background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:14px">
        A new code was sent to your email.
      </div>
      {% endif %}

      <h3 style="margin:0 0 6px;font-size:1.1rem">Check your email</h3>
      <p class="text-sm text-muted" style="margin:0 0 4px">
        We sent a 6-digit code to
      </p>
      <p style="font-weight:600;font-size:14px;margin:0 0 20px;color:#111827">{{ masked_email }}</p>

      <form method="POST" action="/verify-email/{{ user_id }}" id="verify-form">
        <div class="code-inputs">
          {% for i in range(6) %}
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"
                 id="digit-{{ i }}" name="d{{ i }}" autocomplete="off" required>
          {% endfor %}
        </div>
        <input type="hidden" name="code" id="full-code">
        <button type="submit" class="btn btn-primary w-full btn-lg">Verify Email</button>
      </form>

      <p class="text-center mt-4 text-sm text-muted">
        Didn't receive it?
        <form method="POST" action="/verify-email/{{ user_id }}/resend" style="display:inline">
          <button type="submit" style="background:none;border:none;padding:0;color:var(--black);font-weight:600;cursor:pointer;font-size:inherit">Resend code</button>
        </form>
      </p>
    </div>
  </div>

  <script>
    const inputs = document.querySelectorAll('.code-inputs input');

    inputs.forEach((el, idx) => {
      el.addEventListener('input', () => {
        el.value = el.value.replace(/\D/g, '').slice(-1);
        if (el.value && idx < inputs.length - 1) inputs[idx + 1].focus();
        syncCode();
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !el.value && idx > 0) {
          inputs[idx - 1].focus();
        }
      });
      el.addEventListener('paste', e => {
        e.preventDefault();
        const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        paste.split('').slice(0, 6).forEach((ch, i) => {
          if (inputs[i]) inputs[i].value = ch;
        });
        inputs[Math.min(paste.length, 5)].focus();
        syncCode();
      });
    });

    function syncCode() {
      document.getElementById('full-code').value = Array.from(inputs).map(i => i.value).join('');
    }

    document.getElementById('verify-form').addEventListener('submit', syncCode);
    inputs[0].focus();
  </script>
</body>
</html>
