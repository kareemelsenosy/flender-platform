server {
    server_name ordersheet.flendergroup.com;

    # Image folders for local search can be very large (multi-GB ZIPs).
    # 0 = no nginx-imposed cap; the app enforces its own ceiling.
    client_max_body_size 0;

    # Allow up to 60 minutes for the full request/response so a large
    # ZIP upload over a slow connection isn't killed mid-stream.
    client_body_timeout 1800s;
    client_header_timeout 60s;
    send_timeout 1800s;

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (search progress, notifications)
        proxy_buffering off;
        proxy_request_buffering off;   # stream uploads straight through
        proxy_cache off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ordersheet.flendergroup.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ordersheet.flendergroup.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = ordersheet.flendergroup.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name ordersheet.flendergroup.com;
    return 404; # managed by Certbot
}
